name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Check formatting
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

  test:
    # The repo has four modules (root + lookaround + ner + pfilter); a single
    # `./...` from the root does not cross module boundaries, so each module is
    # tested on its own. Submodules resolve the parent via the local `replace`
    # in their go.mod. ner and pfilter unit tests need no model or shared
    # library — the live end-to-end tests run in ml-live.yml instead.
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "lookaround", "ner", "pfilter"]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go test -race ./...
