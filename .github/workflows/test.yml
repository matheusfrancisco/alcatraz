name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Check formatting
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

  test:
    # The repo has two modules (root + lookaround); a single `./...` from the
    # root does not cross the module boundary, so each module is tested on its
    # own. lookaround resolves the parent via the local `replace` in its go.mod.
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "lookaround"]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go test -race ./...
